name: Test Unix Installer
on:
  pull_request:
    paths:
      - install.sh
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: test-install-unix-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [depot-ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Run install.sh from repo
        run: bash install.sh
      - name: Verify binary exists
        run: |
          exe="$HOME/.resend/bin/resend"
          if [ ! -f "$exe" ]; then
            echo "Binary not found at $exe"
            exit 1
          fi
          echo "Found binary at $exe"
      - name: Verify binary runs
        run: |
          "$HOME/.resend/bin/resend" --version
          "$HOME/.resend/bin/resend" --help
