name: Sync Skills

on:
  push:
    branches: [main]
    paths: ['skills/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Trigger sync on resend-skills
        env:
          GH_TOKEN: ${{ secrets.SYNC_SKILLS_TO_RESEND_SKILLS }}
        run: |
          gh workflow run sync-from-repo.yml \
            --repo resend/resend-skills \
            --field repo=resend-cli \
            --field skill-path=skills/resend-cli \
            --field skill-name=resend-cli \
            --field sha=${{ github.sha }} \
            --field reviewer=${{ github.actor }}
