name: Pin Dependencies Check
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
concurrency:
  group: pin-dependencies-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pin-dependencies-check:
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10
    container:
      image: node:24
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Check for pinned dependencies
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const errors = [];

            function isPinned(version) {
              return /^\d+\.\d+\.\d+(-[\w.]+)?$|^[a-z]+:[a-z]+@\d+$|^catalog:$/.test(version);
            }

            for (const [dep, version] of Object.entries(pkg.dependencies || {})) {
              if (!isPinned(version)) {
                errors.push(`Dependency "${dep}" is not pinned: "${version}"`);
              }
            }

            for (const [dep, version] of Object.entries(pkg.devDependencies || {})) {
              if (!isPinned(version) && !version.includes("-beta")) {
                errors.push(`Dev dependency "${dep}" is not pinned: "${version}"`);
              }
            }

            if (errors.length > 0) {
              console.error(`\n${errors.join("\n")}\n`);
              process.exit(1);
            } else {
              console.log("All dependencies are pinned.");
            }
          '
