name: Test Telemetry (Windows)
on:
  push:
    branches:
      - feat-telemetry
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Node bundle
        run: pnpm build
        env:
          POSTHOG_PUBLIC_KEY: ${{ secrets.POSTHOG_STAGING_KEY }}
      - name: Build Windows binary
        run: pnpm exec pkg dist/cli.cjs --compress Brotli --target node24-win-x64 --output dist/resend.exe
      - name: Test flush command
        shell: bash
        run: |
          echo '{"api_key":"${{ secrets.POSTHOG_STAGING_KEY }}","distinct_id":"ci-windows","event":"cli.used","properties":{"command":"ci smoke test","os":"Windows","install_method":"ci"}}' > "$RUNNER_TEMP/telemetry-test.json"
          dist/resend.exe telemetry flush "$RUNNER_TEMP/telemetry-test.json"
          if [ -f "$RUNNER_TEMP/telemetry-test.json" ]; then
            echo "::error::File was not consumed — flush did not run"
            exit 1
          fi
          echo "Flush OK — file consumed and sent"
