name: Test Telemetry (Windows)
on:
  push:
    branches:
      - feat-telemetry
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Node bundle
        run: pnpm build
        env:
          POSTHOG_PUBLIC_KEY: ${{ secrets.POSTHOG_STAGING_KEY }}
      - name: Build Windows binary
        run: pnpm exec pkg dist/cli.cjs --compress Brotli --target node24-win-x64 --output dist/resend.exe
      - name: Test telemetry spawn from binary
        shell: bash
        run: |
          # Clear any leftover telemetry files
          rm -f "$TEMP"/resend-telemetry-*.json 2>/dev/null

          # Run a real command that triggers telemetry
          dist/resend.exe --api-key re_fake whoami

          # Give the detached child time to flush
          sleep 10

          # Verify the temp file was consumed by the child
          remaining=$(ls "$TEMP"/resend-telemetry-*.json 2>/dev/null | wc -l)
          if [ "$remaining" -gt 0 ]; then
            echo "::error::Telemetry temp file was not consumed — detached self-spawn failed"
            ls -la "$TEMP"/resend-telemetry-*.json
            exit 1
          fi
          echo "Telemetry spawn OK — temp file consumed by child process"
