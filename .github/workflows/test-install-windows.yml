name: Test Windows Installer

on:
  pull_request:
    paths:
      - install.ps1
      - .github/workflows/test-install-windows.yml
  workflow_dispatch:

jobs:
  test-install:
    runs-on: windows-latest
    strategy:
      matrix:
        shell: [pwsh, powershell]
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v6

      - name: Run installer via Invoke-Expression (simulates irm | iex)
        run: |
          Invoke-Expression (Get-Content -Raw .\install.ps1)

      - name: Verify binary exists
        run: |
          $exe = "$env:USERPROFILE\.resend\bin\resend.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Binary not found at $exe"
            exit 1
          }
          Write-Host "Found binary at $exe"

      - name: Verify binary runs
        run: |
          $exe = "$env:USERPROFILE\.resend\bin\resend.exe"
          & $exe --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "resend --version failed"
            exit 1
          }

      - name: Verify PATH was updated
        run: |
          $binDir = "$env:USERPROFILE\.resend\bin"
          $path = [Environment]::GetEnvironmentVariable("PATH", "User")
          if ($path -notlike "*$binDir*") {
            Write-Error "$binDir was not added to PATH"
            exit 1
          }
          Write-Host "PATH correctly updated"

  test-error-path:
    runs-on: windows-latest
    strategy:
      matrix:
        shell: [pwsh, powershell]
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v6

      - name: Run installer with bogus version and verify error
        run: |
          $env:RESEND_VERSION = 'v99.99.99'
          $errorThrown = $false
          $output = ''
          try {
            $output = Invoke-Expression (Get-Content -Raw .\install.ps1) *>&1 | Out-String
          } catch {
            $errorThrown = $true
          }
          if (-not $errorThrown) {
            Write-Error "Expected installer to throw on bogus version"
            exit 1
          }
          if ($output -notmatch 'error:') {
            Write-Error "Expected 'error:' in output"
            exit 1
          }
          Write-Host "Error path handled correctly and shell survived"
