name: Test Windows Installer

on:
  push:
    branches:
      - chore/test-windows-installer
  pull_request:
    paths:
      - install.ps1
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install.ps1 from repo
        shell: pwsh
        run: .\install.ps1

      - name: Verify binary exists
        shell: pwsh
        run: |
          $exe = "$env:USERPROFILE\.resend\bin\resend.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Binary not found at $exe"
            exit 1
          }
          Write-Host "Found binary at $exe"

      - name: Verify binary is a valid executable
        shell: pwsh
        run: |
          $exe = "$env:USERPROFILE\.resend\bin\resend.exe"
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "Binary is not a valid PE executable (missing MZ header)"
            exit 1
          }
          $sizeMB = [math]::Round($bytes.Length / 1MB, 1)
          Write-Host "Valid PE executable: $exe ($sizeMB MB)"

      - name: Verify PATH was updated
        shell: pwsh
        run: |
          $binDir = "$env:USERPROFILE\.resend\bin"
          $path = [Environment]::GetEnvironmentVariable("PATH", "User")
          if ($path -notlike "*$binDir*") {
            Write-Error "$binDir was not added to PATH"
            exit 1
          }
          Write-Host "PATH correctly updated"
